<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
  <title id="title">Hoosier Online primary logo</title>
  <desc id="desc">Hoosier Online logo with red segmented basketball H emblem, black HOOSIER wordmark, green ONLINE text, and gold divider bars.</desc>
  <defs>
    <style>
      .ho-word { font-family: "Barlow Condensed", "Arial Narrow", "Roboto Condensed", Impact, sans-serif; font-weight: 900; letter-spacing: .035em; }
      .ho-sub { font-family: "Inter", "Arial", sans-serif; font-weight: 900; letter-spacing: .34em; }
    </style>
    <clipPath id="ballClip">
      <circle cx="185" cy="260" r="145"/>
    </clipPath>
  </defs>
  <rect width="1400" height="520" fill="#F7F3E8"/>
  <g id="logo-mark" fill="#B11217">
    <circle cx="185" cy="260" r="145"/>
    <g clip-path="url(#ballClip)">
      <rect x="158" y="112" width="54" height="296" fill="#F7F3E8"/>
      <rect x="40" y="236" width="290" height="48" fill="#F7F3E8"/>
      <path d="M78 144 C132 178, 132 342, 78 376" fill="none" stroke="#F7F3E8" stroke-width="44" stroke-linecap="round"/>
      <path d="M292 144 C238 178, 238 342, 292 376" fill="none" stroke="#F7F3E8" stroke-width="44" stroke-linecap="round"/>
      <path d="M52 260 H318" fill="none" stroke="#F7F3E8" stroke-width="22"/>
    </g>
    <rect x="132" y="175" width="48" height="170" fill="#B11217"/>
    <rect x="190" y="175" width="48" height="170" fill="#B11217"/>
    <rect x="132" y="236" width="106" height="48" fill="#B11217"/>
  </g>
  <text class="ho-word" x="410" y="260" font-size="178" fill="#0F1113">HOOSIER</text>
  <line x1="408" y1="334" x2="515" y2="334" stroke="#F2B01E" stroke-width="10"/>
  <text class="ho-sub" x="550" y="362" font-size="62" fill="#2E5B34">ONLINE</text>
  <line x1="1066" y1="334" x2="1178" y2="334" stroke="#F2B01E" stroke-width="10"/>
</svg>
