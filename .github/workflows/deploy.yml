name: Deploy to HostGator

on:
  push:
    branches: ["claude/admin-site-assessment-4Zrig"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SFTP
        run: |
          sudo apt-get install -y lftp
          lftp -u "${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }}" \
            -e "set sftp:connect-program 'ssh -o StrictHostKeyChecking=no'; \
                mirror --reverse --verbose \
                  --exclude-glob .git/ \
                  --exclude-glob .github/ \
                  --exclude database.php \
                  --exclude admin-secrets.php \
                  --exclude stripe-config.php \
                  --exclude porkbun-config.php \
                  . /public_html/; \
                bye" \
            sftp://${{ secrets.FTP_HOST }}
