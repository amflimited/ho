name: Deploy to HostGator

on:
  push:
    branches: ["claude/admin-site-assessment-4Zrig"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy changed files via FTP
        run: |
          sudo apt-get install -y lftp

          BEFORE="${{ github.event.before }}"
          SKIP='(database\.php|admin-secrets\.php|stripe-config\.php|porkbun-config\.php|^\.github/)'

          FILES=$(git ls-files | grep -Ev "$SKIP" || true)

          [ -z "$FILES" ] && { echo "Nothing to deploy."; exit 0; }
          echo "Deploying $(echo "$FILES" | wc -l) file(s)..."

          BATCH=$(mktemp)
          echo "open ftp://${{ secrets.FTP_HOST }}" >> "$BATCH"
          echo "user ${{ secrets.FTP_USERNAME }} ${{ secrets.FTP_PASSWORD }}" >> "$BATCH"
          echo "set ftp:passive-mode yes" >> "$BATCH"

          declare -A DIRS_DONE
          while IFS= read -r f; do
            dir=$(dirname "$f")
            if [ "$dir" != "." ] && [ -z "${DIRS_DONE[$dir]}" ]; then
              echo "mkdir -p /public_html/$dir" >> "$BATCH"
              DIRS_DONE[$dir]=1
            fi
            echo "put $f /public_html/$f" >> "$BATCH"
          done <<< "$FILES"

          echo "bye" >> "$BATCH"
          lftp -f "$BATCH"
