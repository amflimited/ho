name: Deploy to HostGator

on:
  push:
    branches: ["claude/admin-site-assessment-4Zrig"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy changed files via SFTP
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass

          BEFORE="${{ github.event.before }}"
          SKIP='(database\.php|admin-secrets\.php|stripe-config\.php|porkbun-config\.php|^\.github/)'

          if git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
            FILES=$(git diff --name-only "$BEFORE" HEAD | grep -Ev "$SKIP")
          else
            FILES=$(git ls-files | grep -Ev "$SKIP")
          fi

          [ -z "$FILES" ] && { echo "Nothing to deploy."; exit 0; }
          echo "Deploying: $FILES"

          BATCH=$(mktemp)
          while IFS= read -r f; do
            dir=$(dirname "$f")
            [ "$dir" != "." ] && echo "-mkdir /public_html/$dir" >> "$BATCH"
            echo "put $f /public_html/$f" >> "$BATCH"
          done <<< "$FILES"

          sshpass -e sftp \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=60 \
            -b "$BATCH" \
            "${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_HOST }}"
