name: Deploy to HostGator

on:
  push:
    branches: ["claude/admin-site-assessment-4Zrig"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via rsync
        env:
          SSHPASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y rsync sshpass
          rsync -az --checksum \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='database.php' \
            --exclude='admin-secrets.php' \
            --exclude='stripe-config.php' \
            --exclude='porkbun-config.php' \
            -e "sshpass -e ssh -o StrictHostKeyChecking=no" \
            ./ ${{ secrets.FTP_USERNAME }}@${{ secrets.FTP_HOST }}:/public_html/
