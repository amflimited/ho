name: Unzip Backup

on:
  workflow_dispatch:
    inputs:
      zip_path:
        description: "Path to ZIP in repo"
        required: true
        default: "backups/incoming/hoosier_online_backup.zip"
      output_dir:
        description: "Where to unzip it. Use . for repo root."
        required: true
        default: "."

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Verify inputs
        run: |
          ZIP_PATH="${{ github.event.inputs.zip_path }}"
          OUTPUT_DIR="${{ github.event.inputs.output_dir }}"

          echo "ZIP_PATH=$ZIP_PATH"
          echo "OUTPUT_DIR=$OUTPUT_DIR"

          if [ -z "$ZIP_PATH" ]; then
            echo "zip_path is blank"
            exit 1
          fi

          if [ -z "$OUTPUT_DIR" ]; then
            echo "output_dir is blank"
            exit 1
          fi

          if [ "$OUTPUT_DIR" = "/" ]; then
            echo "Use . for repo root, not /"
            exit 1
          fi

          test -f "$ZIP_PATH" || {
            echo "ZIP not found: $ZIP_PATH"
            exit 1
          }

      - name: Unzip backup into temp folder
        run: |
          ZIP_PATH="${{ github.event.inputs.zip_path }}"

          rm -rf /tmp/hoosier_unzip
          mkdir -p /tmp/hoosier_unzip
          unzip -q "$ZIP_PATH" -d /tmp/hoosier_unzip

      - name: Copy unzipped files into target
        run: |
          OUTPUT_DIR="${{ github.event.inputs.output_dir }}"

          if [ "$OUTPUT_DIR" = "." ]; then
            rsync -av \
              --exclude ".git" \
              --exclude ".github/workflows/unzip-backup.yml" \
              /tmp/hoosier_unzip/ ./
          else
            rm -rf "$OUTPUT_DIR"
            mkdir -p "$OUTPUT_DIR"
            rsync -av \
              --exclude ".git" \
              /tmp/hoosier_unzip/ "$OUTPUT_DIR"/
          fi

      - name: Commit unzipped backup
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add .
          git commit -m "Unzip Hoosier Online backup" || echo "No changes to commit"
          git push
